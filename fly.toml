app = "lorapok-red-bot"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  DRY_RUN = "false"
  LOG_LEVEL = "INFO"

[[services]]
  protocol = "tcp"
  internal_port = 8000
  processes = ["web"]

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  [[services.http_checks]]
    interval = "30s"
    timeout = "10s"
    grace_period = "15s"
    method = "GET"
    path = "/health"

[processes]
  web = "uvicorn app.dashboard.api:app --host 0.0.0.0 --port 8000"
  worker = "python -m app.main"
