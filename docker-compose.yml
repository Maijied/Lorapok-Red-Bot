version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lorapok_red_bot
      POSTGRES_USER: lorapok
      POSTGRES_PASSWORD: lorapok_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lorapok -d lorapok_red_bot"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "6379:6379"

  bot:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql://lorapok:lorapok_dev@postgres:5432/lorapok_red_bot
      REDIS_URL: redis://redis:6379/0
      DRY_RUN: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  dashboard:
    build: .
    env_file: .env
    environment:
      COMMAND: dashboard
      DATABASE_URL: postgresql://lorapok:lorapok_dev@postgres:5432/lorapok_red_bot
      REDIS_URL: redis://redis:6379/0
      DRY_RUN: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
